services:
  mysql:
    image: dhi.io/mysql:9.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gera_sintegra
      MYSQL_USER: sintegra
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - sintegra_mysql:/var/lib/mysql
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://sintegra:${MYSQL_PASSWORD}@mysql:3306/gera_sintegra
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      UPLOAD_DIR: /app/uploads
    volumes:
      - sintegra_uploads:/app/uploads
    expose:
      - "3001"
    networks:
      - app_internal
      - shared-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - app_internal
      - shared-network

volumes:
  sintegra_mysql:
  sintegra_uploads:

networks:
  app_internal:
    driver: bridge
  shared-network:
    external: true
    name: shared-network
