name: Build & Deploy

on:
  push:
    branches:
      - main
  # Permite disparar manualmente pelo GitHub
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/gera-sintegra-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/gera-sintegra-frontend

jobs:
  # ----------------------------------------------------------------
  # Build e push do Backend
  # ----------------------------------------------------------------
  build-backend:
    name: Backend – Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadados da imagem (tags e labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Configura Buildx (build multi-plataforma)
        uses: docker/setup-buildx-action@v3

      - name: Build e Push – Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ----------------------------------------------------------------
  # Build e push do Frontend
  # ----------------------------------------------------------------
  build-frontend:
    name: Frontend – Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadados da imagem (tags e labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Configura Buildx (build multi-plataforma)
        uses: docker/setup-buildx-action@v3

      - name: Build e Push – Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ----------------------------------------------------------------
  # Deploy automático na VPS via SSH
  # Roda após os dois builds concluírem com sucesso
  # ----------------------------------------------------------------
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Copia docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: ~/gera-sintegra/

      - name: Pull das novas imagens e restart dos containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/gera-sintegra
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
